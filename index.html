<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yield Portal — Multi-Protocol Yield Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25;
            --border: #2a2a3a; --text: #e0e0e0; --text2: #888;
            --green: #00e676; --red: #ff5252; --blue: #448aff;
            --gold: #ffd740; --purple: #b388ff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
        
        .header { padding: 24px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.4em; }
        .header .meta { color: var(--text2); font-size: 0.85em; }
        
        .tabs { display: flex; gap: 4px; padding: 12px 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9em; color: var(--text2); background: none; border: none; white-space: nowrap; }
        .tab:hover { background: var(--surface2); color: var(--text); }
        .tab.active { background: var(--blue); color: #fff; }
        
        .stats-bar { display: flex; gap: 16px; padding: 16px 20px; flex-wrap: wrap; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; flex: 1; min-width: 120px; }
        .stat .value { font-size: 1.4em; font-weight: 700; }
        .stat .label { color: var(--text2); font-size: 0.8em; margin-top: 2px; }
        
        .filters { display: flex; gap: 8px; padding: 12px 20px; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 0.85em; }
        .filter-btn:hover, .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
        .search { flex: 1; min-width: 200px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.9em; }
        
        .table-wrap { padding: 0 20px 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th { text-align: left; padding: 10px 12px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
        th:hover { color: var(--text); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--surface); }
        
        .apy { font-weight: 700; }
        .apy.high { color: var(--green); }
        .apy.mid { color: var(--gold); }
        .apy.low { color: var(--text); }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 500; }
        .badge-stablecoin { background: #1b5e20; color: #a5d6a7; }
        .badge-eth { background: #1a237e; color: #9fa8da; }
        .badge-btc { background: #4a148c; color: #ce93d8; }
        .badge-other { background: #333; color: #aaa; }
        
        .tvl { color: var(--text2); }
        .chain { color: var(--text2); font-size: 0.85em; }
        
        .section { padding: 20px; display: none; }
        .section.active { display: block; }
        
        .chain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .chain-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
        .chain-card .name { font-weight: 600; margin-bottom: 8px; }
        .chain-card .tvl { font-size: 1.2em; font-weight: 700; }
        
        .footer { text-align: center; padding: 20px; color: var(--text2); font-size: 0.8em; border-top: 1px solid var(--border); }
        .footer a { color: var(--text2); }
        
        .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
        .empty h2 { font-size: 1.2em; margin-bottom: 8px; color: var(--text); }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Yield Portal</h1>
        <div class="meta" id="meta"></div>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-tab="all">All Yields</button>
        <button class="tab" data-tab="stablecoins">💵 Stablecoins</button>
        <button class="tab" data-tab="eth">⟠ ETH</button>
        <button class="tab" data-tab="btc">₿ BTC</button>
        <button class="tab" data-tab="risk">🛡️ Risk-Adjusted</button>
        <button class="tab" data-tab="chains">⛓️ Chains</button>
    </div>
    
    <div class="stats-bar" id="stats-bar"></div>
    
    <div class="filters" id="filters">
        <input type="text" class="search" id="search" placeholder="Search token, protocol, chain...">
    </div>
    
    <div class="section active" id="section-all"></div>
    <div class="section" id="section-stablecoins"></div>
    <div class="section" id="section-eth"></div>
    <div class="section" id="section-btc"></div>
    <div class="section" id="section-risk"></div>
    <div class="section" id="section-chains"></div>
    
    <div class="footer">
        Built with data, not vibes. • <a href="https://github.com/bubbamacxtxt-cyber/yield-portal">GitHub</a>
    </div>

    <script>
        let DATA = null;
        let currentTab = 'all';
        let sortCol = 'apy';
        let sortDir = 'desc';

        async function loadData() {
            try {
                const resp = await fetch('data.json');
                DATA = await resp.json();
                render();
            } catch (e) {
                document.getElementById('section-all').innerHTML = '<div class="empty"><h2>No data yet</h2><p>Data will appear after the first GitHub Actions fetch.</p></div>';
            }
        }

        function fmt(n, type) {
            if (n == null) return '—';
            if (type === 'apy') return n.toFixed(2) + '%';
            if (type === 'tvl') {
                if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
                if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
                if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
                return '$' + n.toFixed(0);
            }
            return n;
        }

        function apyClass(apy) {
            if (apy >= 5) return 'high';
            if (apy >= 2) return 'mid';
            return 'low';
        }

        function badge(type) {
            return `<span class="badge badge-${type}">${type}</span>`;
        }

        function renderStats() {
            const s = DATA.stats;
            document.getElementById('stats-bar').innerHTML = `
                <div class="stat"><div class="value">${s.total_tokens.toLocaleString()}</div><div class="label">Tokens Tracked</div></div>
                <div class="stat"><div class="value">${s.total_chains}</div><div class="label">Chains</div></div>
                <div class="stat"><div class="value">${s.total_protocols}</div><div class="label">Protocols</div></div>
                <div class="stat"><div class="value">${fmt(s.total_tvl, 'tvl')}</div><div class="label">Total TVL</div></div>
            `;
            const updated = new Date(DATA.generatedAt);
            document.getElementById('meta').textContent = `Updated: ${updated.toLocaleString()}`;
        }

        function renderTable(tokens, containerId, showRisk = false) {
            if (!tokens || tokens.length === 0) {
                document.getElementById(containerId).innerHTML = '<div class="empty"><h2>No data</h2></div>';
                return;
            }
            
            const sorted = [...tokens].sort((a, b) => {
                let va = a[sortCol], vb = b[sortCol];
                if (sortCol === 'risk_score') { va = a.risk_score || 0; vb = b.risk_score || 0; }
                return sortDir === 'desc' ? vb - va : va - vb;
            });

            const rows = sorted.map(t => `<tr>
                <td><strong>${t.symbol}</strong> ${badge(t.asset_type)}</td>
                <td class="chain">${t.chain}</td>
                <td>${t.protocol}</td>
                <td class="apy ${apyClass(t.apy)}">${fmt(t.apy, 'apy')}</td>
                <td class="tvl">${fmt(t.tvl_usd, 'tvl')}</td>
                ${showRisk ? `<td>${t.risk_score ? t.risk_score.toFixed(1) : '—'}</td>` : ''}
            </tr>`).join('');

            document.getElementById(containerId).innerHTML = `
                <div class="table-wrap"><table>
                    <thead><tr>
                        <th data-col="symbol">Token</th>
                        <th data-col="chain">Chain</th>
                        <th data-col="protocol">Protocol</th>
                        <th data-col="apy">APY</th>
                        <th data-col="tvl_usd">TVL</th>
                        ${showRisk ? '<th data-col="risk_score">Risk Score</th>' : ''}
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table></div>
            `;
        }

        function renderChains() {
            const grid = document.getElementById('section-chains');
            if (!DATA.chainSummary) { grid.innerHTML = ''; return; }
            grid.innerHTML = '<div class="chain-grid">' + DATA.chainSummary.map(c => `
                <div class="chain-card">
                    <div class="name">${c.chain}</div>
                    <div class="tvl">${fmt(c.total_tvl, 'tvl')}</div>
                    <div style="color:var(--text2);font-size:0.85em">${c.token_count} tokens • avg ${(c.avg_apy || 0).toFixed(2)}% APY</div>
                </div>
            `).join('') + '</div>';
        }

        function render() {
            if (!DATA) return;
            renderStats();
            
            const search = document.getElementById('search').value.toLowerCase();
            const filter = (tokens) => {
                if (!search) return tokens;
                return tokens.filter(t => 
                    t.symbol.toLowerCase().includes(search) ||
                    t.protocol.toLowerCase().includes(search) ||
                    t.chain.toLowerCase().includes(search)
                );
            };

            renderTable(filter(DATA.allByApy || []), 'section-all');
            renderTable(filter(DATA.topYields?.stablecoin || []), 'section-stablecoins');
            renderTable(filter(DATA.topYields?.eth || []), 'section-eth');
            renderTable(filter(DATA.topYields?.btc || []), 'section-btc');
            renderTable(filter(DATA.riskAdjusted || []), 'section-risk', true);
            renderChains();
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                document.getElementById('section-' + currentTab).classList.add('active');
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', render);

        // Sort on header click
        document.addEventListener('click', e => {
            if (e.target.dataset.col) {
                if (sortCol === e.target.dataset.col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
                else { sortCol = e.target.dataset.col; sortDir = 'desc'; }
                render();
            }
        });

        loadData();
    </script>
</body>
</html>
